{{ define "main" }}
	<style>
		.main-layout {
			display: flex;
			align-items: flex-start;
			gap: 4rem;
			width: 100%;
		}

		.main-content {
			flex: 1;
			min-width: 0;
		}

		.main-aside {
			width: 300px;
			aspect-ratio: 1 / 1;
			position: sticky;
			top: 4rem;
			flex-shrink: 0;
		}

		@media (max-width: 768px) {
			.main-layout {
				flex-direction: column;
			}

			.main-aside {
				order: -1;

				width: 100%;
				aspect-ratio: auto;
				position: relative;
				top: 0;
			}
		}
	</style>

	<div class="main-layout">
		<div class="main-content">
			{{ with .GetTerms "tags" }}
				Tags:
				{{ range . }}
					<a href="{{ .RelPermalink }}" class="text-muted-foreground hover:text-link-hover transition-colors">
						#{{ .LinkTitle }}
					</a>&nbsp;
				{{ end }}
			{{ end }}
			{{ .Content }}
		</div>

		<aside class="main-aside">
			{{ partial "knowledge-graph/widget.html" . }}
		</aside>
	</div>
{{ end }}
